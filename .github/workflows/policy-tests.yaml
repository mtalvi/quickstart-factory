name: Policy Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'core/oc-policy-gate/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run policy hook tests
        working-directory: core/oc-policy-gate
        run: |
          chmod +x openshift-policy.sh test-openshift-policy.sh
          ./test-openshift-policy.sh
